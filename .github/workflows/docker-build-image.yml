name: Build docker images

on:
  workflow_dispatch:
  workflow_call:
      secrets:
        REGISTRY_PASSWORD_DOCKER:
          required: true
        PUBLISH_TO_GITHUB_REPO_TOKEN:
          required: true
      inputs:
        push-images:
          required: true
          type: boolean

jobs:
  build-docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - run: ls -l
      - run: cat docker-build.env >> $GITHUB_ENV

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ inputs.push-images }}
        with:
          username: ${{ env.REGISTRY_USERNAME_DOCKER }}
          password: ${{ secrets.REGISTRY_PASSWORD_DOCKER }}
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ inputs.push-images }}
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_USERNAME_GHCR }}
          password: ${{ secrets.PUBLISH_TO_GITHUB_REPO_TOKEN }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./
          file: ./Dockerfile
          push: ${{ inputs.push-images }}
          build-args: |
            IMAGE_TAG=${{ env.IMAGE_TAG }}
          tags: |
            ${{ env.DOCKER_IMAGE_NAME_DOCKER }}:latest
            ${{ env.DOCKER_IMAGE_NAME_DOCKER }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE_NAME_GHCR }}:latest
            ${{ env.DOCKER_IMAGE_NAME_GHCR }}:${{ env.IMAGE_TAG }}
